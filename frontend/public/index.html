<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="description" content="Grant Tracker - Transparent Grant and Fund Tracking System for Student Projects" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Grant Tracker" />

    <!-- Favicon -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />

    <!-- Web App Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Title -->
    <title>Grant Tracker - Algorand Blockchain</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Styles -->
    <style>
        html {
            scroll-behavior: smooth;
        }
        
        body {
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: linear-gradient(135deg, #f9fafb 0%, #f3f4f6 100%);
            min-height: 100vh;
        }
        
        code {
            font-family: source-code-pro, Menlo, Monaco, Consolas, 'Courier New', monospace;
        }
        
        #root {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* Loading animation */
        
        .root-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        
        .loading-content {
            text-align: center;
            color: white;
        }
        
        .spinner-large {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid #2563eb;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        
        .loading-content h1 {
            margin: 0 0 10px 0;
            font-size: 2rem;
            font-weight: 700;
        }
        
        .loading-content p {
            margin: 0;
            font-size: 1.1rem;
            opacity: 0.9;
        }
    </style>

    <!-- No-JS Fallback -->
    <noscript>
      <div style="
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        color: white;
        font-family: sans-serif;
        padding: 20px;
      ">
        <div style="text-align: center;">
          <h1 style="margin: 0 0 10px 0; font-size: 2rem;">⚠️ JavaScript Required</h1>
          <p style="margin: 0; font-size: 1.1rem;">Please enable JavaScript to use Grant Tracker.</p>
        </div>
      </div>
    </noscript>
</head>

<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <!-- Loading fallback -->
    <script>
        // Show loading message while React loads
        if (!window.REACT_LOADED) {
            const root = document.getElementById('root');
            root.innerHTML = `
          <div class="root-loading">
            <div class="loading-content">
              <div class="spinner-large"></div>
              <h1>🎓 Grant Tracker</h1>
              <p>Loading application...</p>
            </div>
          </div>
        `;
        }
    </script>
</body>

</html>
